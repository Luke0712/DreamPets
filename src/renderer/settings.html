<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌宠技能</title>
    <link rel="stylesheet" href="./settings.css" />
  </head>
  <body>
    <form id="settingsForm" class="settings-form">
      <section class="settings-panel settings-page" id="skillsPanel">
        <div class="skills-list-wrap">
          <div class="skills-list-head">
            <div class="skills-title">已添加技能</div>
            <button id="toggleSkillEditor" class="add-icon-button" type="button" aria-label="添加技能" title="添加技能">+</button>
          </div>
          <div id="skillsList" class="skills-list"></div>
        </div>
      </section>
      <section class="settings-panel settings-page" id="skillEditorPage" hidden>
        <div id="skillEditor" class="skill-editor">
          <label class="field">
            <span>技能名称</span>
            <input id="skillName" name="skillName" type="text" placeholder="例如：代码助手" autocomplete="off" />
          </label>
          <label class="field">
            <span>技能文件夹</span>
            <div class="folder-row">
              <input id="skillPath" name="skillPath" type="text" placeholder="选择一个文件夹" autocomplete="off" readonly />
              <button id="chooseSkillFolder" type="button">选择</button>
            </div>
          </label>
        </div>
      </section>
      <p id="status" class="status" role="status" aria-live="polite"></p>
      <footer id="editorActions" class="settings-actions" hidden>
        <button id="cancelSkillEditor" type="button">取消</button>
        <button id="addSkill" class="primary-button" type="button">确认添加</button>
      </footer>
    </form>
    <script src="./settings.js"></script>
  </body>
</html>
